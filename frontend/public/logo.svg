<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 150" width="460" height="150" font-family="'Poppins','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="swoosh" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a6b"/>
      <stop offset="45%" stop-color="#1a8fb0"/>
      <stop offset="75%" stop-color="#19a6a0"/>
      <stop offset="100%" stop-color="#27b06b"/>
    </linearGradient>
    <linearGradient id="swoosh2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1aa0a8"/>
      <stop offset="100%" stop-color="#27b06b"/>
    </linearGradient>
  </defs>

  <!-- Swoosh arc around SH -->
  <path d="M28 118 C 40 150, 150 150, 185 92 C 205 60, 215 38, 250 30 C 215 44, 205 70, 188 98 C 150 138, 55 138, 36 112 Z"
        fill="url(#swoosh)"/>
  <path d="M250 30 C 282 22, 300 40, 300 68 C 300 44, 282 34, 252 42 Z"
        fill="url(#swoosh2)"/>

  <!-- Dotted globe accent -->
  <g fill="#1e3a6b" opacity="0.55">
    <circle cx="232" cy="40" r="2"/><circle cx="240" cy="38" r="2"/><circle cx="248" cy="40" r="2"/>
    <circle cx="236" cy="46" r="2"/><circle cx="244" cy="46" r="2"/><circle cx="252" cy="48" r="2"/>
    <circle cx="240" cy="54" r="2"/><circle cx="248" cy="54" r="2"/><circle cx="256" cy="42" r="2"/>
  </g>

  <!-- SH monogram -->
  <text x="40" y="92" font-size="86" font-weight="700" fill="#1e3a6b" font-family="Georgia,'Times New Roman',serif">SH</text>

  <!-- Brand name -->
  <text x="40" y="126" font-size="30" font-weight="700" fill="#1e3a6b" letter-spacing="1">SH Global <tspan fill="#27b06b">EDU</tspan></text>

  <!-- Tagline -->
  <text x="42" y="146" font-size="12.5" font-weight="500" fill="#5a6b82" letter-spacing="2">Connect · Educate · Empower</text>
</svg>
