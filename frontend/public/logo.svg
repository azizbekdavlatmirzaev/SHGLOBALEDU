<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 410" width="600" height="410" font-family="'Poppins','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="swN" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6fd6"/>
      <stop offset="40%" stop-color="#1a93ad"/>
      <stop offset="70%" stop-color="#1fb070"/>
      <stop offset="100%" stop-color="#27b06b"/>
    </linearGradient>
    <linearGradient id="swN2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a93ad"/>
      <stop offset="100%" stop-color="#27b06b"/>
    </linearGradient>
  </defs>

  <!-- Main swoosh ribbon -->
  <path d="M60 300 C 110 348, 340 356, 450 268 C 512 218, 520 150, 472 102 C 506 150, 496 210, 440 252 C 332 330, 120 330, 66 292 Z" fill="url(#swN)"/>
  <!-- Small accent swoosh tail -->
  <path d="M472 102 C 512 74, 548 96, 542 142 C 534 110, 504 98, 474 114 Z" fill="url(#swN2)"/>

  <!-- Dotted globe -->
  <g fill="#16315f" opacity="0.55">
    <circle cx="455" cy="118" r="2.4"/>
    <circle cx="427" cy="132" r="2.4"/><circle cx="441" cy="132" r="2.4"/><circle cx="455" cy="132" r="2.4"/><circle cx="469" cy="132" r="2.4"/><circle cx="483" cy="132" r="2.4"/>
    <circle cx="427" cy="146" r="2.4"/><circle cx="441" cy="146" r="2.4"/><circle cx="455" cy="146" r="2.4"/><circle cx="469" cy="146" r="2.4"/><circle cx="483" cy="146" r="2.4"/>
    <circle cx="413" cy="160" r="2.4"/><circle cx="427" cy="160" r="2.4"/><circle cx="441" cy="160" r="2.4"/><circle cx="455" cy="160" r="2.4"/><circle cx="469" cy="160" r="2.4"/><circle cx="483" cy="160" r="2.4"/><circle cx="497" cy="160" r="2.4"/>
    <circle cx="427" cy="174" r="2.4"/><circle cx="441" cy="174" r="2.4"/><circle cx="455" cy="174" r="2.4"/><circle cx="469" cy="174" r="2.4"/><circle cx="483" cy="174" r="2.4"/>
    <circle cx="427" cy="188" r="2.4"/><circle cx="441" cy="188" r="2.4"/><circle cx="455" cy="188" r="2.4"/><circle cx="469" cy="188" r="2.4"/><circle cx="483" cy="188" r="2.4"/>
    <circle cx="455" cy="202" r="2.4"/>
  </g>

  <!-- SH monogram -->
  <text x="150" y="258" font-size="210" font-weight="700" fill="#16315f" font-family="Georgia,'Times New Roman',serif">SH</text>

  <!-- Brand name -->
  <text x="300" y="338" text-anchor="middle" font-size="74" font-weight="700" fill="#16315f" letter-spacing="1">Global <tspan fill="#1f9d57">EDU</tspan></text>

  <!-- Tagline with side lines -->
  <line x1="120" y1="378" x2="182" y2="378" stroke="#9aa7ba" stroke-width="2"/>
  <line x1="418" y1="378" x2="480" y2="378" stroke="#9aa7ba" stroke-width="2"/>
  <text x="300" y="384" text-anchor="middle" font-size="23" font-weight="500" fill="#5a6b82" letter-spacing="1.5">Connect · Educate · Empower</text>
</svg>
